<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>氣功 · Qi Gong Quotidien</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#b5892a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Qi Gong">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1a14;
      --surface: #1a2a1f;
      --card: #223028;
      --accent: #b5892a;
      --accent2: #7aab6e;
      --text: #e8dfc8;
      --muted: #8a9e8d;
      --radius: 14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 28px 20px 16px;
      text-align: center;
      background: linear-gradient(180deg, #0a1510 0%, var(--bg) 100%);
    }

    header .zh { font-size: 2.2rem; color: var(--accent); letter-spacing: 6px; }
    header h1 { font-size: 1.1rem; font-weight: 400; color: var(--muted); margin-top: 4px; letter-spacing: 2px; }
    header .date { font-size: 0.8rem; color: var(--muted); margin-top: 6px; opacity: 0.7; }

    main { flex: 1; padding: 16px 16px 32px; max-width: 520px; margin: 0 auto; width: 100%; }

    .section-title { font-size: 0.72rem; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; margin-bottom: 12px; }

    .categories {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 24px;
    }

    .cat-btn {
      background: var(--card);
      border: 1.5px solid transparent;
      border-radius: var(--radius);
      padding: 16px 10px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
    }

    .cat-btn:last-child { grid-column: 1 / -1; }

    .cat-btn .emoji { font-size: 1.8rem; display: block; margin-bottom: 6px; }
    .cat-btn .label { font-size: 0.85rem; font-weight: 600; display: block; }
    .cat-btn .sublabel { font-size: 0.7rem; color: var(--muted); display: block; margin-top: 2px; }

    .cat-btn.active {
      border-color: var(--accent);
      background: #2a3a22;
    }

    .cat-btn:active { transform: scale(0.97); }

    .video-section {
      display: none;
      animation: fadeIn 0.3s ease;
    }
    .video-section.visible { display: block; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .select-wrap {
      position: relative;
      margin-bottom: 16px;
    }

    .select-wrap::after {
      content: '▾';
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--accent);
      pointer-events: none;
      font-size: 1rem;
    }

    select {
      width: 100%;
      background: var(--card);
      border: 1.5px solid #3a4f3d;
      border-radius: var(--radius);
      color: var(--text);
      padding: 14px 40px 14px 16px;
      font-size: 0.9rem;
      appearance: none;
      -webkit-appearance: none;
      cursor: pointer;
      outline: none;
    }

    select:focus { border-color: var(--accent); }

    .video-info {
      background: var(--card);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 16px;
      border-left: 3px solid var(--accent);
      display: none;
    }
    .video-info.visible { display: block; }
    .video-info .v-title { font-size: 1rem; font-weight: 600; margin-bottom: 4px; }
    .video-info .v-desc { font-size: 0.8rem; color: var(--muted); margin-bottom: 8px; }
    .tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag {
      background: #1a3320;
      color: var(--accent2);
      font-size: 0.7rem;
      padding: 3px 8px;
      border-radius: 20px;
    }

    .player-wrap {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
      border-radius: var(--radius);
      overflow: hidden;
      background: #000;
      display: none;
    }
    .player-wrap.visible { display: block; }
    .player-wrap iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
    }

    .play-btn {
      width: 100%;
      background: linear-gradient(135deg, var(--accent), #8a6820);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 16px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 12px;
      letter-spacing: 1px;
      -webkit-tap-highlight-color: transparent;
      display: none;
    }
    .play-btn.visible { display: block; }
    .play-btn:active { opacity: 0.85; }

    footer {
      text-align: center;
      padding: 12px;
      font-size: 0.7rem;
      color: var(--muted);
      opacity: 0.5;
    }
  </style>
</head>
<body>

<header>
  <div class="zh">氣功</div>
  <h1>Entretien Quotidien · Qi Gong</h1>
  <div class="date" id="dateDisplay"></div>
</header>

<main>
  <div class="section-title">Choisissez un moment</div>

  <div class="categories">
    <button class="cat-btn" data-cat="matin" onclick="selectCat(this)">
      <span class="emoji">🌅</span>
      <span class="label">Matin</span>
      <span class="sublabel">Éveil · Immunité</span>
    </button>
    <button class="cat-btn" data-cat="midi" onclick="selectCat(this)">
      <span class="emoji">☀️</span>
      <span class="label">Midi</span>
      <span class="sublabel">Saisons · Méridiens</span>
    </button>
    <button class="cat-btn" data-cat="soir" onclick="selectCat(this)">
      <span class="emoji">🌙</span>
      <span class="label">Soir</span>
      <span class="sublabel">Détente · Sommeil</span>
    </button>
    <button class="cat-btn" data-cat="massage" onclick="selectCat(this)">
      <span class="emoji">💆</span>
      <span class="label">Automassage</span>
      <span class="sublabel">Visage · Acupression</span>
    </button>
    <button class="cat-btn" data-cat="complet" onclick="selectCat(this)">
      <span class="emoji">⏱</span>
      <span class="label">Programme Complet</span>
      <span class="sublabel">35–60 min · Corps entier</span>
    </button>
  </div>

  <div class="video-section" id="videoSection">
    <div class="section-title">Sélectionnez une pratique</div>
    <div class="select-wrap">
      <select id="videoSelect" onchange="selectVideo()">
        <option value="">— Choisir —</option>
      </select>
    </div>

    <div class="video-info" id="videoInfo">
      <div class="v-title" id="vTitle"></div>
      <div class="v-desc" id="vDesc"></div>
      <div class="tags" id="vTags"></div>
    </div>

    <button class="play-btn" id="playBtn" onclick="launchVideo()">▶ Lancer la pratique</button>

    <div class="player-wrap" id="playerWrap">
      <iframe id="ytPlayer" allowfullscreen allow="autoplay"></iframe>
    </div>
  </div>
</main>

<footer>氣功 · Médecine Traditionnelle Chinoise</footer>

<script>
  const DATA = {
    matin: [
      { titre: "Stimuler le Système Immunitaire", desc: "Exercices d'éveil et de renforcement immunitaire", duree: "~20 min", focus: "Éveil Yang · Immunité", organes: "Poumons · Wei Qi", niveau: "Débutant", id: "AoGOZ48jM0g" },
      { titre: "Qi Gong du Matin", desc: "Conscience du corps dans l'instant présent", duree: "~15 min", focus: "Éveil Yang · Corps entier", organes: "Méridiens généraux", niveau: "Débutant", id: "gqWL6FazTko" },
      { titre: "Qi Gong – Séquence du Matin", desc: "Séquence d'éveil énergétique", duree: "~15 min", focus: "Éveil Yang · Corps entier", organes: "Méridiens Yang · Articulations", niveau: "Débutant", id: "CxBbm7w1Ems" },
      { titre: "Qigong Le Tigre – Colonne & Dos", desc: "Renforcer et étirer la colonne vertébrale", duree: "5 min", focus: "Colonne · Dos supérieur", organes: "Reins · Colonne (Du Mai)", niveau: "Débutant", id: "g9y2-1x1ohg" },
      { titre: "Respiration Profonde – Ouverture & Nettoyage", desc: "Opening, Cleansing, Warming", duree: "15 min", focus: "Respiration · Nettoyage énergétique", organes: "Poumons · Triple Réchauffeur", niveau: "Débutant", id: "QNgWb3EDXCI" }
    ],
    midi: [
      { titre: "Ba Duan Jin – Shaolin (8 Pièces de Brocart)", desc: "Routine complète – étirement général des méridiens", duree: "20 min", focus: "Étirement général · Toutes saisons", organes: "12 méridiens · Corps entier", niveau: "Débutant/Inter.", id: "UpN3AcXLSSk" },
      { titre: "Qi Gong du Cœur – Maître Ke Wen", desc: "Été · Élément Feu · Cœur et Intestin Grêle", duree: "~15 min", focus: "Été · Élément Feu", organes: "Cœur · Intestin Grêle", niveau: "Intermédiaire", id: "fjzkIDvgNx4" },
      { titre: "Printemps · Étirements & Foie", desc: "Qi Gong débutant – Printemps, assouplissements, Foie", duree: "~20 min", focus: "Printemps · Élément Bois", organes: "Foie · Vésicule Biliaire", niveau: "Débutant", id: "dlxPXtZT3f4" },
      { titre: "Qi Gong d'Automne · Poumons & Bonne Humeur", desc: "Santé des poumons · Cultiver le bonheur · Immunité", duree: "~20 min", focus: "Automne · Élément Métal", organes: "Poumons · Gros Intestin", niveau: "Débutant", id: "wbwB0KeB54I" },
      { titre: "8 Exercices – Reins Plus Forts en Hiver", desc: "8 mouvements Maître Zhang Guangde pour les Reins", duree: "~20 min", focus: "Hiver · Élément Eau", organes: "Reins · Vessie", niveau: "Débutant", id: "oMlv-sEborU" },
      { titre: "I Jing Qi Gong – Étirement de tout le corps", desc: "Étirements complets · Mobilité vertébrale et méridiens", duree: "~20 min", focus: "Colonne vertébrale", organes: "Du Mai · Méridiens tendinaux", niveau: "Débutant", id: "J3fevqiHYqg" },
      { titre: "Les 18 Mouvements du Tai Ji Qi Gong", desc: "Enchaînement complet synthétisant Taijiquan et Qi Gong", duree: "~25 min", focus: "Toutes saisons · Programme général", organes: "12 méridiens · Équilibre Yin/Yang", niveau: "Débutant/Inter.", id: "bgfxk6kBbm0" },
      { titre: "Maître Ke Wen · Qi Gong de la Rate", desc: "Été Tardif · Élément Terre · Rate, Estomac, Pancréas", duree: "~15 min", focus: "Été Tardif · Élément Terre", organes: "Rate · Estomac · Pancréas", niveau: "Intermédiaire", id: "fGpN9f0dwaM" },
      { titre: "Maître Ke Wen · Qi Gong du Foie et des Yeux", desc: "Printemps · Foie · Vision · Enseignement complet", duree: "~45 min", focus: "Printemps · Élément Bois", organes: "Foie · Vésicule Biliaire · Yeux", niveau: "Intermédiaire", id: "NKgbZsCeGCc" },
      { titre: "Maître Ke Wen · Qi Gong des Poumons", desc: "Enchaînement complet automne – Purification des poumons", duree: "~20 min", focus: "Automne · Élément Métal", organes: "Poumons · Gros Intestin", niveau: "Intermédiaire", id: "wwM5ru1f2xo" },
      { titre: "Maître Ke Wen · Reins 1/2 – Renforcer et préserver", desc: "Hiver · Préserver le Qi des reins (1er mouvement)", duree: "~10 min", focus: "Hiver · Élément Eau", organes: "Reins · Essence Jing", niveau: "Intermédiaire", id: "UtNJVPUZGrs" },
      { titre: "Maître Ke Wen · Reins 2/2 – Renforcer et préserver", desc: "Hiver · Préserver le Qi des reins (2e mouvement)", duree: "~10 min", focus: "Hiver · Élément Eau", organes: "Reins · Vessie", niveau: "Intermédiaire", id: "LSX_oMLqxIo" }
    ],
    soir: [
      { titre: "Qi Gong – Sommeil Profond", desc: "4 exercices MTC · Troubles du sommeil liés aux Reins et au Cœur", duree: "~15 min", focus: "Soir · Apaisement Yin", organes: "Reins · Cœur", niveau: "Débutant", id: "atJ6zs3kI2I" },
      { titre: "Qi Gong pour la Détente", desc: "3 exercices · Respiration naturelle · Ralentir les rythmes", duree: "~10 min", focus: "Soir · Détente · Yin descendant", organes: "Triple Réchauffeur · Système nerveux", niveau: "Débutant", id: "Ho3PRJKxtbc" }
    ],
    massage: [
      { titre: "Automassage Visage & Ventre", desc: "Zones réflexes du visage · Organes internes · Dantian", duree: "~15 min", focus: "Visage · Ventre · Dantian", organes: "Rate · Estomac · Foie · 5 sens", niveau: "Débutant", id: "9UwK47WxEXw" },
      { titre: "Massage Crâne, Nuque & Épaules", desc: "Auto-massage du crâne, du cou et des épaules", duree: "~15 min", focus: "Tête · Nuque · Épaules", organes: "Bai Hui · Du Mai · VB21", niveau: "Débutant", id: "vjl1SXe_xIk" },
      { titre: "Automassage Stress, Émotions & Circulation", desc: "4 points d'acuponcture · Anti-stress · MTC", duree: "20 min", focus: "Stress · Émotions · Circulation", organes: "Rate-Estomac", niveau: "Débutant", id: "oS3NrgfhqNs" }
    ],
    complet: [
      { titre: "Programme Complet – Corps Entier", desc: "Programme complet toutes saisons · corps entier", duree: "35–60 min", focus: "Programme complet · Toutes saisons", organes: "12 méridiens · Corps entier", niveau: "Débutant", id: "KjYhoAuGqUU" },
      { titre: "Fascial Maneuvers – Full Body Fascia Reset", desc: "10 manœuvres fasciales · Libérer tensions physiques, émotionnelles et énergétiques", duree: "45 min", focus: "Fascias · Corps entier", organes: "Fascias · Méridiens tendinaux · Système nerveux", niveau: "Débutant", id: "aIKk7PSxc5k" },
      { titre: "Ba Duan Jin Complet – 8 Pièces de Brocart", desc: "Méthode complète MTC – Accessible à tous", duree: "41 min", focus: "Ba Duan Jin · Toutes saisons", organes: "12 méridiens · Équilibre Yin/Yang", niveau: "Débutant", id: "hM_Gw6aGlJI" }
    ]
  };

  let currentVideo = null;

  function formatDate() {
    const d = new Date();
    const jours = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
    const mois = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
    return `${jours[d.getDay()]} ${d.getDate()} ${mois[d.getMonth()]} ${d.getFullYear()}`;
  }

  document.getElementById('dateDisplay').textContent = formatDate();

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
  }

  function selectCat(btn) {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    const cat = btn.dataset.cat;
    const videos = DATA[cat];
    const sel = document.getElementById('videoSelect');
    sel.innerHTML = '<option value="">— Choisir une pratique —</option>';
    videos.forEach((v, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = `${v.titre} · ${v.duree}`;
      sel.appendChild(opt);
    });

    sel.dataset.cat = cat;
    document.getElementById('videoSection').classList.add('visible');
    document.getElementById('videoInfo').classList.remove('visible');
    document.getElementById('playBtn').classList.remove('visible');
    document.getElementById('playerWrap').classList.remove('visible');
    document.getElementById('ytPlayer').src = '';
    currentVideo = null;

    document.getElementById('videoSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function selectVideo() {
    const sel = document.getElementById('videoSelect');
    const idx = sel.value;
    if (idx === '') {
      document.getElementById('videoInfo').classList.remove('visible');
      document.getElementById('playBtn').classList.remove('visible');
      document.getElementById('playerWrap').classList.remove('visible');
      document.getElementById('ytPlayer').src = '';
      return;
    }

    const cat = sel.dataset.cat;
    const v = DATA[cat][idx];
    currentVideo = v;

    document.getElementById('vTitle').textContent = v.titre;
    document.getElementById('vDesc').textContent = v.desc;
    document.getElementById('vTags').innerHTML =
      `<span class="tag">${v.duree}</span>` +
      `<span class="tag">${v.focus}</span>` +
      `<span class="tag">${v.organes}</span>` +
      `<span class="tag">${v.niveau}</span>`;

    document.getElementById('videoInfo').classList.add('visible');
    document.getElementById('playBtn').classList.add('visible');
    document.getElementById('playerWrap').classList.remove('visible');
    document.getElementById('ytPlayer').src = '';
  }

  function launchVideo() {
    if (!currentVideo) return;
    const wrap = document.getElementById('playerWrap');
    document.getElementById('ytPlayer').src =
      `https://www.youtube-nocookie.com/embed/${currentVideo.id}?autoplay=1&rel=0`;
    wrap.classList.add('visible');
    wrap.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
</script>

</body>
</html>
